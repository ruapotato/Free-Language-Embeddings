const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(1.8, 1.2, 1.8);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
scene.add(new THREE.AmbientLight(0x404040, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);

// Sphere wireframe
const sphereGeo = new THREE.SphereGeometry(1.0, 32, 32);
const sphereWire = new THREE.LineSegments(
    new THREE.WireframeGeometry(sphereGeo),
    new THREE.LineBasicMaterial({ color: 0x222244, transparent: true, opacity: 0.15 })
);
sphereWire.visible = false;
scene.add(sphereWire);

// Axes
const axesGroup = new THREE.Group();
const axLen = 1.3;
const axColors = [0xff4444, 0x44ff44, 0x4444ff];
const axLabels = ['PC1', 'PC2', 'PC3'];
for (let i = 0; i < 3; i++) {
    const dir = new THREE.Vector3(); dir.setComponent(i, 1);
    const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(), axLen, axColors[i], 0.05, 0.03);
    axesGroup.add(arrow);
}
scene.add(axesGroup);

// Points
const meshes = [];
const baseGeo = new THREE.SphereGeometry(0.006, 6, 6);
const bigGeo = new THREE.SphereGeometry(0.012, 8, 8);

wordData.forEach((d, i) => {
    const isCat = d.cat !== 'other';
    const mat = new THREE.MeshPhongMaterial({
        color: new THREE.Color(d.color),
        emissive: new THREE.Color(d.color).multiplyScalar(isCat ? 0.4 : 0.15),
        transparent: !isCat,
        opacity: isCat ? 1.0 : 0.4,
    });
    const mesh = new THREE.Mesh(isCat ? bigGeo : baseGeo, mat);
    mesh.position.set(d.x, d.y, d.z);
    mesh.userData = { word: d.w, cat: d.cat, color: d.color, count: d.count, idx: i };
    scene.add(mesh);
    meshes.push(mesh);
});

// Raycaster for hover
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.02 };
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function onMouseMove(e) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(meshes.filter(m => m.visible));
    if (hits.length > 0) {
        const d = hits[0].object.userData;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY + 15) + 'px';
        tooltip.innerHTML = '<b style="color:' + d.color + '">' + d.word + '</b><br>' +
            'Category: ' + d.cat + '<br>Count: ' + d.count.toLocaleString();
    } else {
        tooltip.style.display = 'none';
    }
}
window.addEventListener('mousemove', onMouseMove);

// Search
document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    if (!q) {
        meshes.forEach(m => {
            m.scale.set(1,1,1);
            m.material.opacity = m.userData.cat !== 'other' ? 1.0 : 0.4;
        });
        return;
    }
    let found = null;
    meshes.forEach(m => {
        const match = m.userData.word.toLowerCase().includes(q);
        if (match) {
            m.scale.set(3,3,3);
            m.material.opacity = 1.0;
            if (!found) found = m;
        } else {
            m.scale.set(0.5,0.5,0.5);
            m.material.opacity = 0.1;
        }
    });
    if (found) {
        controls.target.copy(found.position);
    }
});

// Category toggles
document.querySelectorAll('.cat-toggle').forEach(cb => {
    cb.addEventListener('change', function() {
        const cat = this.dataset.cat;
        meshes.forEach(m => {
            if (m.userData.cat === cat) m.visible = this.checked;
        });
    });
});
document.getElementById('toggle-other').addEventListener('change', function() {
    meshes.forEach(m => { if (m.userData.cat === 'other') m.visible = this.checked; });
});
document.getElementById('show-sphere').addEventListener('change', function() {
    sphereWire.visible = this.checked;
});
document.getElementById('show-axes').addEventListener('change', function() {
    axesGroup.visible = this.checked;
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
